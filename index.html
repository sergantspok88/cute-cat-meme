            setCucumber(true);
            const sIdx = findCatByMood("Shocked");
            setCatIndex(sIdx); setThemeIndex(sIdx);
            setCaption("AAAAH! WHAT IS THAT?!");
            flashMoodChange();
            setTimeout(() => setCucumber(false), 2500);

      useEffect(() => {
        const t = setInterval(() => {
          if (boxOffer || Date.now() < boxUntil || isNapping) return;
          if (Math.random() < 0.07) {
            const id = Date.now();
            setBoxOffer({ id });
            setTimeout(() => setBoxOffer((b) => (b && b.id === id ? null : b)), 6000);

                  </div>
                )}
                {Date.now() < cooldownUntil && (
                  <div style={{ position: "absolute", inset: 0, background: "rgba(255,255,255,0.82)", borderRadius: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 6, padding: 20, textAlign: "center" }}>
                    <div style={{ fontSize: 16, fontWeight: 700, color: theme.accent, marginBottom: 10, lineHeight: 1.4 }}>{cooldownMsg}</div>
                    <div style={{ fontSize: 36, fontWeight: 800, color: theme.accent, fontVariantNumeric: "tabular-nums" }}>
                      {Math.ceil((cooldownUntil - Date.now()) / 1000)}s
                    </div>
                    <div style={{ fontSize: 11, color: "#888", marginTop: 6 }}>petting resumes shortly…</div>
                  </div>
                )}
                {isNapping && (
                  <div style={{ position: "absolute", top: 20, right: 30, fontSize: 24, color: "#5C6BC0", animation: "zzz 2s ease-in-out infinite" }}>
                    z Z z
                  </div>
                )}
                {cucumber && (
                  <div style={{ position: "absolute", left: "50%", bottom: 30, transform: "translateX(-50%)", fontSize: 48, animation: "cucumberDrop 0.4s ease-out forwards", zIndex: 4, pointerEvents: "none" }}>
                    🥒
                  </div>
                )}
                {Date.now() < boxUntil && (
                  <div style={{ position: "absolute", left: "50%", bottom: 4, transform: "translateX(-50%)", fontSize: 80, zIndex: 5, pointerEvents: "none", animation: "boxBob 1.6s ease-in-out infinite" }}>
                    📦
                    <div style={{ position: "absolute", top: 18, left: "50%", transform: "translateX(-50%)", fontSize: 18 }}>{cat.eyes}</div>
                  </div>
                )}
                {Date.now() < loafUntil && (
                  <div style={{ position: "absolute", top: 30, right: 4, background: "#D2691E", color: "#fff", padding: "4px 10px", borderRadius: 12, fontSize: 12, fontWeight: 800, animation: "loafPulse 2s ease-in-out infinite" }}>
                    🍞 LOAF MODE
                  </div>
                )}
                {dvdMode && (
                  <div style={{ position: "absolute", left: `${dvdPos.x}%`, top: `${dvdPos.y}%`, fontSize: 32, zIndex: 7, pointerEvents: "none", animation: "dvdFloat 2s ease-in-out infinite", filter: `hue-rotate(${(dvdPos.x + dvdPos.y) * 4}deg)` }}>
                    🐱
                  </div>
                )}
                {hairballFloaters.map((h) => (
                  <div key={h.id} style={{ position: "absolute", left: `${h.x}%`, bottom: 30, fontSize: 22, animation: "hairballFloat 2.5s ease-out forwards", pointerEvents: "none" }}>🧶</div>
                ))}
                {barfing && (
                  <div style={{ position: "absolute", left: "50%", top: "55%", pointerEvents: "none", zIndex: 4 }}>
                    <div style={{ position: "absolute", left: 0, top: 0, transform: "translate(-50%, 0)", width: 18, height: 60, background: "linear-gradient(to bottom, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff)", borderRadius: "40% 40% 50% 50% / 20% 20% 80% 80%", animation: "barfDrop 2.5s ease-in forwards", boxShadow: "0 0 20px #ff00ff88" }} />
                    {["🟥","🟧","🟨","🟩","🟦","🟪"].map((b, i) => (
                      <div key={i} style={{ position: "absolute", left: (i - 2.5) * 10, top: 5, fontSize: 14, animation: `barfBlob 2.5s ease-in forwards`, animationDelay: `${i * 0.08}s` }}>{b}</div>
                    ))}
                  </div>
                )}
              </div>

              {mouse && (
                <div onClick={catchMouse} style={{ position: "absolute", bottom: 12, fontSize: 24, cursor: "pointer", animation: `${mouse.dir === "ltr" ? "mouseLTR" : "mouseRTL"} 4s linear forwards`, zIndex: 5, userSelect: "none" }} title="Catch the mouse!">
                  {mouse.dir === "ltr" ? "🐭" : "🐭"}
                </div>
              )}

              {boxOffer && (
                <div onClick={(e) => { e.stopPropagation(); sitInBox(); }} style={{ position: "absolute", left: 16, bottom: 80, fontSize: 36, cursor: "pointer", zIndex: 6, animation: "boxBob 1.6s ease-in-out infinite", userSelect: "none" }} title="If it fits, I sits!">
                  📦
                </div>
              )}

              {laser && (
                <div onClick={chaseLaser} style={{ position: "absolute", width: 14, height: 14, borderRadius: "50%", background: "#ff0000", cursor: "pointer", zIndex: 8, animation: `${laser.dir === "ltr" ? "laserLTR" : "laserRTL"} 5s linear forwards, laserPulse 0.6s ease-in-out infinite`, userSelect: "none" }} title="Get the red dot!" />
              )}

              {textNote && (
                <div style={{ position: "absolute", top: -8, left: "50%", transform: "translateX(-50%)", background: "#222", color: "#fff", padding: "8px 14px", borderRadius: 14, fontSize: 12, fontWeight: 600, zIndex: 9, boxShadow: "0 6px 20px rgba(0,0,0,0.25)", whiteSpace: "nowrap", animation: "textSlide 5s ease-in-out forwards", maxWidth: "90%", overflow: "hidden", textOverflow: "ellipsis" }}>
                  📱 {textNote}
                </div>
              )}

              <div style={{ marginTop: 24, background: `${theme.accent}0C`, borderRadius: 20, padding: "14px 20px", textAlign: "center", position: "relative" }}>
                <div style={{ position: "absolute", top: -8, left: "50%", transform: "translateX(-50%)", width: 0, height: 0, borderLeft: "8px solid transparent", borderRight: "8px solid transparent", borderBottom: `8px solid ${theme.accent}0C` }} />
                <p style={{ margin: 0, fontSize: 18, color: "#444", fontWeight: 600, fontStyle: "italic" }}>"{caption}"</p>
              </div>

              <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
                <button onClick={randomize} style={{ flex: 1, padding: "12px 0", borderRadius: 16, border: "none", background: theme.accent, color: "#fff", fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", transition: "transform 0.15s ease, box-shadow 0.15s ease", boxShadow: `0 4px 14px ${theme.accent}44` }} onMouseDown={(e) => (e.target.style.transform = "scale(0.96)")} onMouseUp={(e) => (e.target.style.transform = "scale(1)")}>
                  🎲 New Meme
                </button>
                <button onClick={petCat} style={{ flex: 1, padding: "12px 0", borderRadius: 16, border: `2px solid ${theme.accent}33`, background: "transparent", color: theme.accent, fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", transition: "transform 0.15s ease" }} onMouseDown={(e) => (e.target.style.transform = "scale(0.96)")} onMouseUp={(e) => (e.target.style.transform = "scale(1)")}>
                  🐾 Pet ({petCount})
                </button>
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, fontSize: 12, color: "#666" }}>
                <span>🐾 {petCount} pets</span>
                <span>🎲 {memeCount} memes</span>
                <span>🏅 {unlocked.length}/{ACHIEVEMENTS.length}</span>
              </div>

              <div style={{ marginTop: 8, height: 6, background: `${theme.accent}15`, borderRadius: 4, overflow: "hidden" }}>
                <div style={{ width: `${(unlocked.length / ACHIEVEMENTS.length) * 100}%`, height: "100%", background: `linear-gradient(90deg, ${theme.accent}, ${theme.accent}88, ${theme.accent})`, backgroundSize: "200% 100%", animation: "shimmer 2s linear infinite", transition: "width 0.5s ease" }} />
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={() => setShowAchievements((v) => !v)} style={{ flex: 1, padding: "8px 0", borderRadius: 12, border: `1px solid ${theme.accent}33`, background: "transparent", color: theme.accent, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  🏅 {showAchievements ? "Hide" : "View"} Achievements
                </button>
                <button onClick={resetProgress} style={{ padding: "8px 12px", borderRadius: 12, border: `1px solid #ddd`, background: "transparent", color: "#999", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }} title="Reset progress">
                  ↺
                </button>
              </div>

              {showAchievements && (
                <div style={{ marginTop: 12, maxHeight: 220, overflowY: "auto", background: `${theme.accent}08`, borderRadius: 14, padding: 10, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  {ACHIEVEMENTS.map((a) => {
                    const got = unlocked.includes(a.id);
                    return (
                      <div key={a.id} title={a.desc} style={{ background: got ? `${theme.accent}22` : "#f5f5f5", borderRadius: 10, padding: "6px 8px", fontSize: 11, opacity: got ? 1 : 0.5, border: got ? `1px solid ${theme.accent}55` : "1px solid #eee" }}>
                        <div style={{ fontSize: 16 }}>{got ? a.emoji : "🔒"}</div>
                        <div style={{ fontWeight: 700, color: got ? theme.accent : "#999" }}>{a.name}</div>
                        <div style={{ color: "#888", fontSize: 10 }}>{a.desc}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {toast && (
              <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", background: "#fff", padding: "14px 22px", borderRadius: 16, boxShadow: `0 10px 40px ${theme.accent}55, 0 0 0 2px ${theme.accent}`, animation: "toastIn 0.4s ease", zIndex: 100, display: "flex", alignItems: "center", gap: 12, fontFamily: "inherit" }}>
                <div style={{ fontSize: 32 }}>{toast.emoji}</div>
                <div>
                  <div style={{ fontSize: 11, color: theme.accent, fontWeight: 800, letterSpacing: 1 }}>ACHIEVEMENT UNLOCKED</div>
                  <div style={{ fontSize: 16, fontWeight: 700, color: "#333" }}>{toast.name}</div>
                  <div style={{ fontSize: 12, color: "#888" }}>{toast.desc}</div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<CuteCatMeme />);
  </script>
</body>
</html>
